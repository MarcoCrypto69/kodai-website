<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- *** à personnaliser: titre de l'onglet *** -->
<title>NOM CLIENT — Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* *** COULEURS — changer les 2 valeurs ci-dessous *** */
  :root {
    --c1: #1565c0;   /* couleur principale (foncée) */
    --c2: #1976c8;   /* couleur principale (claire) */
  }

  #chat-toggle {
    position: fixed; bottom: 24px; right: 24px;
    width: 62px; height: 62px; border-radius: 50%;
    background: linear-gradient(135deg, var(--c1), var(--c2));
    border: none; cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; transition: transform 0.2s; z-index: 1000;
  }
  #chat-toggle:hover { transform: scale(1.08); }

  #chat-window {
    position: fixed; bottom: 100px; right: 24px;
    width: 360px; height: 530px;
    background: white; border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    display: none; flex-direction: column; overflow: hidden;
    z-index: 999; animation: slideUp 0.2s ease;
  }
  #chat-window.open { display: flex; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .chat-header {
    background: linear-gradient(135deg, var(--c1), var(--c2));
    padding: 14px 18px; display: flex; align-items: center; gap: 12px;
  }
  .chat-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  .chat-header-name { color: white; font-weight: 700; font-size: 14px; }
  .chat-header-status { color: rgba(255,255,255,0.78); font-size: 11px; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #86efac; display: inline-block; }
  .chat-close { background: none; border: none; color: rgba(255,255,255,0.75); font-size: 22px; cursor: pointer; margin-left: auto; padding: 2px 6px; }
  .chat-close:hover { color: white; }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 14px;
    display: flex; flex-direction: column; gap: 10px; background: #f7f8fc;
  }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

  .msg { display: flex; flex-direction: column; max-width: 86%; }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .bubble { padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.55; }
  .bot .bubble { background: white; color: #1e293b; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .user .bubble { background: linear-gradient(135deg, var(--c1), var(--c2)); color: white; border-bottom-right-radius: 4px; }

  .msg-time { font-size: 10px; color: #94a3b8; margin-top: 3px; padding: 0 4px; }
  .bot .msg-time { align-self: flex-start; }
  .user .msg-time { align-self: flex-end; }

  .typing { display: flex; align-items: center; gap: 5px; padding: 12px 14px; background: white; border-radius: 16px; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); align-self: flex-start; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--c2); animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .quick-replies { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
  .quick-btn { background: white; border: 1px solid var(--c2); color: var(--c1); border-radius: 12px; padding: 5px 11px; font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .quick-btn:hover { background: var(--c2); color: white; }

  .chat-input-area { padding: 12px 14px; background: white; border-top: 1px solid #e8eef8; display: flex; gap: 8px; align-items: center; }
  #userInput { flex: 1; border: 1px solid #cbd5e1; border-radius: 20px; padding: 9px 14px; font-size: 13px; outline: none; background: #f7f8fc; color: #1e293b; }
  #userInput:focus { border-color: var(--c2); background: white; }
  #userInput::placeholder { color: #94a3b8; }
  #sendBtn { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--c1), var(--c2)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; color: white; flex-shrink: 0; transition: transform 0.15s; }
  #sendBtn:hover { transform: scale(1.08); }
  #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .kodai-badge { text-align: center; padding: 6px; font-size: 10px; color: #94a3b8; border-top: 1px solid #f0f4ff; background: white; }
  .kodai-badge a { color: var(--c2); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>

<!-- *** EMOJI du bouton flottant *** -->
<button id="chat-toggle" onclick="toggleChat()">💬</button>

<div id="chat-window">
  <div class="chat-header">
    <!-- *** EMOJI avatar *** -->
    <div class="chat-avatar">🤖</div>
    <div>
      <!-- *** NOM affiché dans le header *** -->
      <div class="chat-header-name">Assistant — NOM CLIENT</div>
      <div class="chat-header-status"><span class="status-dot"></span> En ligne 24/7</div>
    </div>
    <button class="chat-close" onclick="toggleChat()">×</button>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-area">
    <input type="text" id="userInput" placeholder="Posez votre question..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="kodai-badge">Propulsé par <a href="https://kodai.ca" target="_blank">KodAI.ca</a></div>
</div>

<script>
// *** ROUTE API — changer NOM-CLIENT pour correspondre à /api/NOM-CLIENT.js ***
const API_ROUTE = '/api/NOM-CLIENT';

// *** MESSAGE DE BIENVENUE ***
const WELCOME_MSG = "Bonjour! 👋 Je suis l'assistant de [NOM CLIENT]. Comment puis-je vous aider?";

// *** BOUTONS RAPIDES (3-5 max) ***
const QUICK_REPLIES = [
  "Question 1",
  "Question 2",
  "Question 3",
  "Nous contacter",
];

// ============================================================
// NE PAS MODIFIER EN DESSOUS DE CETTE LIGNE
// ============================================================
let messages = [];
let isOpen = false;

function toggleChat() {
  isOpen = !isOpen;
  document.getElementById('chat-window').classList.toggle('open', isOpen);
  if (isOpen && messages.length === 0) {
    addBotMessage(WELCOME_MSG, QUICK_REPLIES);
  }
}

function now() { return new Date().toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'}); }

function addBotMessage(text, replies=[]) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `<div class="bubble">${text}</div>${replies.length?`<div class="quick-replies">${replies.map(r=>`<button class="quick-btn" onclick="sendMessage('${r}')">${r}</button>`).join('')}</div>`:''}<div class="msg-time">${now()}</div>`;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="bubble">${text}</div><div class="msg-time">${now()}</div>`;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'typing'; d.id = 'typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() { const t=document.getElementById('typing'); if(t)t.remove(); }

async function sendMessage(text) {
  const input = document.getElementById('userInput');
  const msg = text || input.value.trim();
  if (!msg) return;
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  addUserMessage(msg);
  messages.push({role:'user', content:msg});
  showTyping();
  try {
    const res = await fetch(API_ROUTE, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({messages})
    });
    const data = await res.json();
    const reply = data.message;
    messages.push({role:'assistant', content:reply});
    hideTyping();
    addBotMessage(reply);
  } catch(e) {
    hideTyping();
    addBotMessage("Désolé, une erreur est survenue. Veuillez nous contacter directement.");
  }
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}
</script>
</body>
</html>
